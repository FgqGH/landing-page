<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>落地页模板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1a1a2e;
      line-height: 1.6;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .nav-links a {
      margin-left: 32px;
      text-decoration: none;
      color: #666;
      font-size: 14px;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: #1a1a2e;
    }

    .nav-cta {
      background: #1a1a2e;
      color: #fff !important;
      padding: 10px 24px;
      border-radius: 100px;
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      background: linear-gradient(160deg, #f8f9ff 0%, #fff 60%);
    }

    .hero h1 {
      font-size: clamp(40px, 7vw, 80px);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -2px;
    }

    .hero h1 span {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: clamp(16px, 2vw, 20px);
      color: #6b7280;
      max-width: 560px;
      margin: 0 auto 40px;
    }

    .hero-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 40px;
      border: none;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(26,26,46,0.2);
    }

    .btn-secondary {
      background: #fff;
      color: #1a1a2e;
      padding: 16px 40px;
      border: 2px solid #e5e7eb;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .btn-secondary:hover {
      border-color: #1a1a2e;
    }

    /* Features */
    .features {
      padding: 100px 48px;
      background: #fff;
    }

    .section-label {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #6366f1;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-title {
      text-align: center;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      margin-bottom: 16px;
    }

    .section-sub {
      text-align: center;
      color: #6b7280;
      font-size: 18px;
      margin-bottom: 64px;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .feature-card {
      padding: 32px;
      border-radius: 20px;
      border: 1px solid #f0f0f0;
      transition: box-shadow 0.3s, transform 0.3s;
    }

    .feature-card:hover {
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      transform: translateY(-4px);
    }

    .feature-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .feature-card h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .feature-card p {
      color: #6b7280;
      font-size: 15px;
    }

    /* CTA */
    .cta {
      padding: 100px 24px;
      text-align: center;
      background: linear-gradient(160deg, #1a1a2e 0%, #2d2d5a 100%);
    }

    .cta h2 {
      font-size: clamp(30px, 4vw, 52px);
      font-weight: 800;
      color: #fff;
      margin-bottom: 20px;
    }

    .cta p {
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      margin-bottom: 40px;
    }

    .cta .btn-primary {
      background: #6366f1;
    }

    /* Footer */
    footer {
      padding: 48px;
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
      border-top: 1px solid #f0f0f0;
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav {
        padding: 16px 24px;
      }
      .nav-links {
        display: none;
      }
      .features {
        padding: 64px 24px;
      }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <div class="logo">YourBrand</div>
    <div class="nav-links">
      <a href="#features">功能</a>
      <a href="#about">关于</a>
      <a href="#contact" class="nav-cta">联系我</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div>
      <h1>让想法<br><span>更快落地</span></h1>
      <p>一款帮助你快速构建、高质量交付的现代解决方案。一切从这里开始。</p>
      <div class="hero-btns">
        <button class="btn-primary" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">开始使用</button>
        <button class="btn-secondary" onclick="document.getElementById('features').scrollIntoView({behavior:'smooth'})">了解更多</button>
      </div>
    </div>
  </section>

  <!-- Features -->
  <section class="features" id="features">
    <div class="section-label">核心功能</div>
    <h2 class="section-title">为什么选择我们</h2>
    <p class="section-sub">三个核心优势，让你安心托付</p>

    <div class="features-grid">
      <div class="feature-card">
        <div class="feature-icon" style="background:#eef2ff;">⚡</div>
        <h3>极速响应</h3>
        <p>毫秒级加载速度，全球 CDN 加速，用户体验优先。</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon" style="background:#fdf4ff;">🔒</div>
        <h3>安全可靠</h3>
        <p>端到端加密，自动备份，多重防护保障数据安全。</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon" style="background:#fff7ed;">✨</div>
        <h3>简单易用</h3>
        <p>无需代码基础，三分钟即可上手，真正的零门槛。</p>
      </div>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta" id="contact">
    <h2>准备好开始了？</h2>
    <p>留下你的邮箱，我们将在 24 小时内联系你</p>
    <button class="btn-primary">立即行动 →</button>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 YourBrand. 保留所有权利。</p>
  </footer>

</body>
</html>
