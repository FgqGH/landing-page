<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>落地页模板</title>

  <!-- AOS CSS -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Particles.js -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1a1a2e;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Particles Background */
    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .nav-links a {
      margin-left: 32px;
      text-decoration: none;
      color: #666;
      font-size: 14px;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: #1a1a2e;
    }

    .nav-cta {
      background: #1a1a2e;
      color: #fff !important;
      padding: 10px 24px;
      border-radius: 100px;
    }

    /* Hero */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      background: linear-gradient(160deg, #f8f9ff 0%, #fff 60%);
      z-index: 1;
    }

    .hero h1 {
      font-size: clamp(40px, 7vw, 80px);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -2px;
    }

    .hero h1 span {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: clamp(16px, 2vw, 20px);
      color: #6b7280;
      max-width: 560px;
      margin: 0 auto 40px;
    }

    .hero-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 40px;
      border: none;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(26,26,46,0.2);
    }

    .btn-secondary {
      background: #fff;
      color: #1a1a2e;
      padding: 16px 40px;
      border: 2px solid #e5e7eb;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .btn-secondary:hover {
      border-color: #1a1a2e;
    }

    /* Features */
    .features {
      position: relative;
      padding: 100px 48px;
      background: #fff;
      z-index: 1;
    }

    .section-label {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #6366f1;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-title {
      text-align: center;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      margin-bottom: 16px;
    }

    .section-sub {
      text-align: center;
      color: #6b7280;
      font-size: 18px;
      margin-bottom: 64px;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .feature-card {
      padding: 32px;
      border-radius: 20px;
      border: 1px solid #f0f0f0;
      transition: box-shadow 0.3s, transform 0.3s;
      background: #fff;
    }

    .feature-card:hover {
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      transform: translateY(-4px);
    }

    .feature-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .feature-card h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .feature-card p {
      color: #6b7280;
      font-size: 15px;
    }

    /* Stats */
    .stats {
      position: relative;
      padding: 80px 48px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      z-index: 1;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 40px;
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }

    .stat-item h2 {
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 800;
      color: #fff;
    }

    .stat-item p {
      color: rgba(255,255,255,0.75);
      font-size: 16px;
      margin-top: 8px;
    }

    /* CTA */
    .cta {
      position: relative;
      padding: 100px 24px;
      text-align: center;
      background: linear-gradient(160deg, #1a1a2e 0%, #2d2d5a 100%);
      z-index: 1;
    }

    .cta h2 {
      font-size: clamp(30px, 4vw, 52px);
      font-weight: 800;
      color: #fff;
      margin-bottom: 20px;
    }

    .cta p {
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      margin-bottom: 40px;
    }

    .cta .btn-primary {
      background: #6366f1;
    }

    /* Footer */
    footer {
      position: relative;
      padding: 48px;
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
      border-top: 1px solid #f0f0f0;
      background: #fff;
      z-index: 1;
    }

    /* Typed cursor */
    .typed-cursor {
      color: #6366f1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav { padding: 16px 24px; }
      .nav-links { display: none; }
      .features { padding: 64px 24px; }
      .stats { padding: 64px 24px; }
    }
  </style>
</head>
<body>

  <!-- Particles Background -->
  <div id="particles-js"></div>

  <!-- Nav -->
  <nav>
    <div class="logo">YourBrand</div>
    <div class="nav-links">
      <a href="#features" data-aos="fade-down">功能</a>
      <a href="#stats" data-aos="fade-down">数据</a>
      <a href="#contact" class="nav-cta" data-aos="fade-down">联系我</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div>
      <h1 data-aos="zoom-in" data-aos-duration="1000">
        让想法<br><span id="typed"></span>
      </h1>
      <p data-aos="fade-up" data-aos-delay="300">
        一款帮助你快速构建、高质量交付的现代解决方案。一切从这里开始。
      </p>
      <div class="hero-btns" data-aos="fade-up" data-aos-delay="500">
        <button class="btn-primary" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">开始使用</button>
        <button class="btn-secondary" onclick="document.getElementById('features').scrollIntoView({behavior:'smooth'})">了解更多</button>
      </div>
    </div>
  </section>

  <!-- Features -->
  <section class="features" id="features">
    <div class="section-label" data-aos="fade-up">核心功能</div>
    <h2 class="section-title" data-aos="fade-up" data-aos-delay="100">为什么选择我们</h2>
    <p class="section-sub" data-aos="fade-up" data-aos-delay="200">三个核心优势，让你安心托付</p>

    <div class="features-grid">
      <div class="feature-card" data-aos="fade-up" data-aos-delay="0">
        <div class="feature-icon" style="background:#eef2ff;">⚡</div>
        <h3>极速响应</h3>
        <p>毫秒级加载速度，全球 CDN 加速，用户体验优先。</p>
      </div>
      <div class="feature-card" data-aos="fade-up" data-aos-delay="150">
        <div class="feature-icon" style="background:#fdf4ff;">🔒</div>
        <h3>安全可靠</h3>
        <p>端到端加密，自动备份，多重防护保障数据安全。</p>
      </div>
      <div class="feature-card" data-aos="fade-up" data-aos-delay="300">
        <div class="feature-icon" style="background:#fff7ed;">✨</div>
        <h3>简单易用</h3>
        <p>无需代码基础，三分钟即可上手，真正的零门槛。</p>
      </div>
    </div>
  </section>

  <!-- Stats -->
  <section class="stats" id="stats">
    <div class="stats-grid">
      <div class="stat-item" data-aos="zoom-in" data-aos-delay="0">
        <h2><span class="countup" data-count="10000">0</span>+</h2>
        <p>用户信赖</p>
      </div>
      <div class="stat-item" data-aos="zoom-in" data-aos-delay="150">
        <h2><span class="countup" data-count="99">0</span>%</h2>
        <p>服务可用性</p>
      </div>
      <div class="stat-item" data-aos="zoom-in" data-aos-delay="300">
        <h2><span class="countup" data-count="50">0</span>+</h2>
        <p>功能特性</p>
      </div>
      <div class="stat-item" data-aos="zoom-in" data-aos-delay="450">
        <h2><span class="countup" data-count="24">0</span>/7</h2>
        <p>客户支持</p>
      </div>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta" id="contact">
    <h2 data-aos="fade-up">准备好开始了？</h2>
    <p data-aos="fade-up" data-aos-delay="150">留下你的邮箱，我们将在 24 小时内联系你</p>
    <button class="btn-primary" data-aos="fade-up" data-aos-delay="300">立即行动 →</button>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 YourBrand. 保留所有权利。</p>
  </footer>

  <!-- AOS JS -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

  <!-- Typed.js -->
  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12/lib/typed.min.js"></script>

  <!-- CountUp.js -->
  <script src="https://cdn.jsdelivr.net/npm/countup.js@2.6.2/dist/countUp.umd.min.js"></script>

  <script>
    // AOS init
    AOS.init({
      duration: 800,
      easing: 'ease-out-cubic',
      once: true,
      offset: 60,
    });

    // Typed.js — hero headline
    new Typed('#typed', {
      strings: ['更快落地', '更简单', '更强大'],
      typeSpeed: 80,
      backSpeed: 60,
      backDelay: 1500,
      loop: true,
      smartBackspace: true,
    });

    // Particles.js config
    particlesJS('particles-js', {
      particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: '#6366f1' },
        shape: { type: 'circle' },
        opacity: {
          value: 0.4,
          random: true,
          anim: { enable: true, speed: 0.6, opacity_min: 0.1, sync: false },
        },
        size: {
          value: 3,
          random: true,
          anim: { enable: true, speed: 2, size_min: 0.5, sync: false },
        },
        line_linked: {
          enable: true,
          distance: 140,
          color: '#8b5cf6',
          opacity: 0.15,
          width: 1.2,
        },
        move: {
          enable: true,
          speed: 1.2,
          direction: 'none',
          random: true,
          straight: false,
          out_mode: 'out',
        },
      },
      interactivity: {
        detect_on: 'canvas',
        events: {
          onhover: { enable: true, mode: 'grab' },
          onclick: { enable: true, mode: 'push' },
          resize: true,
        },
        modes: {
          grab: { distance: 120, line_linked: { opacity: 0.5 } },
          push: { particles_nb: 4 },
        },
      },
      retina_detect: true,
    });

    // CountUp — animate numbers when scrolled into view
    const statsSection = document.getElementById('stats');
    const counters = document.querySelectorAll('.countup');
    let counted = false;

    function animateCounters() {
      if (counted) return;
      counters.forEach(el => {
        const target = parseInt(el.getAttribute('data-count'));
        const count = new CountUp(el, target, { duration: 2, separator: ',' });
        if (!count.error) count.start();
      });
      counted = true;
    }

    const statsObs = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) animateCounters();
      });
    }, { threshold: 0.4 });

    statsObs.observe(statsSection);
  </script>

</body>
</html>
